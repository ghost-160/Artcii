<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Artcii Gallery</title>
    <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body class="theme-matrix">
    <div class="app-shell">
        <header class="topbar">
            <h1>Saved Gallery</h1>
            <a class="nav-link" href="/">Back</a>
        </header>

        <main class="gallery-layout">
            {% if artworks %}
                <div class="gallery-grid">
                    {% for art in artworks %}
                        <article class="gallery-card">
                            <pre class="gallery-ascii">{{ art.ascii_content | e }}</pre>

                            <div class="gallery-actions">
                                <a
                                    class="btn btn-primary download-art"
                                    data-id="{{ art.id }}"
                                    href="#"
                                >
                                    Download
                                </a>

                                <form method="POST" action="{{ url_for('delete_art') }}">
                                    <input
                                        type="hidden"
                                        name="art_id"
                                        value="{{ art.id }}"
                                    />
                                    <button
                                        type="submit"
                                        class="btn btn-secondary"
                                    >
                                        Delete
                                    </button>
                                </form>
                            </div>
                        </article>
                    {% endfor %}
                </div>
            {% else %}
                <p>No saved artworks.</p>
            {% endif %}
        </main>
    </div>

    <script>
        document.querySelectorAll(".download-art").forEach(button => {
            button.addEventListener("click", e => {
                e.preventDefault();

                const card = e.target.closest(".gallery-card");
                const content =
                    card.querySelector(".gallery-ascii").textContent;

                const blob = new Blob(
                    [content],
                    { type: "text/plain;charset=utf-8" }
                );

                const link = document.createElement("a");

                link.href = URL.createObjectURL(blob);
                link.download = `artcii_${e.target.dataset.id}.txt`;

                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            });
        });
    </script>
</body>
</html>
